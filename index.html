<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PortariaPro - Painel Master Corrigido</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* CSS BÁSICO PARA TESTE */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #060D10; color: #E8F4F7; padding: 20px; }
.app { max-width: 800px; margin: 0 auto; }
.card { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: #0B3B4A; color: #fff; }
.btn-ghost { background: #162F39; color: #8BB4C4; border: 1px solid rgba(26, 91, 110, 0.4); }
.btn-danger { background: #FF6B5B; color: #fff; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { background: #0E1F26; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-content .handle { width: 40px; height: 4px; background: rgba(26, 91, 110, 0.4); border-radius: 2px; margin: 0 auto 12px; }
.modal-content h3 { margin-bottom: 8px; }
.modal-content .field { margin-bottom: 12px; }
.modal-content .field label { display: block; font-size: 11px; color: #8BB4C4; margin-bottom: 4px; text-transform: uppercase; }
.modal-content .field input, .modal-content .field select { width: 100%; padding: 10px; background: #162F39; border: 1px solid rgba(26, 91, 110, 0.4); border-radius: 8px; color: #E8F4F7; }
.modal-content .btn { width: 100%; margin-top: 8px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #162F39; padding: 10px 20px; border-radius: 20px; z-index: 2000; display: none; }
.toast.show { display: block; }
.portaria-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; border-bottom: 1px solid rgba(26, 91, 110, 0.2); flex-wrap: wrap; gap: 8px; }
.portaria-card .info { flex: 1; min-width: 120px; }
.portaria-card .actions { display: flex; gap: 4px; }
.portaria-card .actions .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; color: #8BB4C4; }
.portaria-card .actions .action-btn:hover { background: #162F39; }
.portaria-card .actions .action-btn.danger:hover { background: rgba(255, 107, 91, 0.2); color: #FF6B5B; }
.badge { padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.badge-green { background: rgba(61, 214, 182, 0.12); color: #3DD6B6; }
.badge-red { background: rgba(255, 107, 91, 0.12); color: #FF6B5B; }
.badge-amber { background: rgba(240, 184, 74, 0.12); color: #F0B84A; }
.master-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.master-stat { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.2); border-radius: 8px; padding: 14px 10px; text-align: center; }
.master-stat .number { font-size: 24px; font-weight: 700; }
.master-stat .label { font-size: 10px; color: #8BB4C4; text-transform: uppercase; }
.master-stat .number.positive { color: #3DD6B6; }
.master-stat .number.negative { color: #FF6B5B; }
.master-stat .number.warning { color: #F0B84A; }
.master-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.master-filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.master-filtros input, .master-filtros select { padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(26, 91, 110, 0.4); background: #162F39; color: #E8F4F7; }
</style>
</head>
<body>

<div class="app">
  <div id="loginScreen" style="display:none;">
    <h1>PortariaPro</h1>
    <p>Faça login para continuar</p>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
  </div>

  <div id="mainApp" style="display:none;">
    <div class="header">
      <h2>🚛 PortariaPro</h2>
      <div id="portariaNome">Carregando...</div>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="pages">
      <!-- PAINEL MASTER -->
      <div id="page-master">
        <div class="master-header">
          <div>
            <h3>👑 Painel Master</h3>
            <p style="color:var(--text2);">Gerencie todas as portarias</p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="openAdicionarPortariaModal()">🏢 Nova Portaria</button>
            <button class="btn btn-primary" onclick="openPlanoModal()">➕ Novo Plano</button>
          </div>
        </div>

        <div class="master-stats" id="masterStats">
          <div class="master-stat"><div class="number" id="totalPortarias">0</div><div class="label">Total Portarias</div></div>
          <div class="master-stat"><div class="number positive" id="ativasCount">0</div><div class="label">Assinaturas Ativas</div></div>
          <div class="master-stat"><div class="number negative" id="vencidasCount">0</div><div class="label">Vencidas</div></div>
          <div class="master-stat"><div class="number warning" id="faturamentoTotal">R$ 0</div><div class="label">Faturamento</div></div>
        </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
            <h4>📋 Portarias Cadastradas</h4>
            <div class="master-filtros">
              <input type="text" id="buscaPortaria" placeholder="🔍 Buscar..." oninput="renderizarListaPortariasMaster()">
              <select id="filtroStatusAssinatura" onchange="renderizarListaPortariasMaster()">
                <option value="">Todos</option>
                <option value="ativa">✅ Ativas</option>
                <option value="vencida">🔴 Vencidas</option>
                <option value="trial">⚠️ Trial</option>
                <option value="cancelada">❌ Canceladas</option>
              </select>
            </div>
          </div>
          <div id="listaPortariasMaster"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURAÇÃO
// ============================================================
const SUPABASE_URL = 'https://wqzbmlfiwmjhkjprnzrv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxemJtbGZpd21qaGtqcHJuenJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDA0MjEsImV4cCI6MjA5NzY3NjQyMX0.vza4qGtnkwq4LMM8HNCoHrfOPb8gzC4wse-qk9Yax9M';

let supa = null;
let todasPortarias = [];
let todasAssinaturas = [];
let planosDisponiveis = [];
let currentUser = null;

// ============================================================
// UTILITÁRIOS
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(text) {
  console.log('⏳', text || 'Carregando...');
}

function hideLoading() {
  console.log('✅ Carregado');
}

// ============================================================
// SUPABASE
// ============================================================
function initSupabase() {
  try {
    supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase conectado');
    return true;
  } catch (e) {
    console.error('❌ Erro:', e);
    return false;
  }
}

// ============================================================
// LOGIN
// ============================================================
async function fazerLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    
    currentUser = data.user;
    localStorage.setItem('portaria_atual', JSON.stringify({
      id: data.user.id,
      nome: 'Master',
      tipo: 'mestre'
    }));
    
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('portariaNome').textContent = '👑 Mestre';
    
    await carregarPainelMaster();
  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

function logout() {
  localStorage.removeItem('portaria_atual');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

// ============================================================
// CARREGAR PAINEL MASTER
// ============================================================
async function carregarPainelMaster() {
  try {
    console.log('🔄 Carregando painel master...');
    showToast('Carregando...');
    
    // Carrega portarias
    const { data: portarias, error: pError } = await supa
      .from('portarias')
      .select('*')
      .order('criado_em', { ascending: false });
    
    if (pError) throw pError;
    todasPortarias = portarias || [];
    console.log('✅ Portarias:', todasPortarias.length);

    // Carrega assinaturas
    const { data: assinaturas, error: aError } = await supa
      .from('assinaturas')
      .select('*');
    
    if (aError && !aError.message.includes('relation')) {
      throw aError;
    }
    todasAssinaturas = assinaturas || [];
    console.log('✅ Assinaturas:', todasAssinaturas.length);

    // Carrega planos
    const { data: planos, error: planError } = await supa
      .from('planos')
      .select('*')
      .eq('ativo', true);
    
    if (planError && !planError.message.includes('relation')) {
      throw planError;
    }
    planosDisponiveis = (planos && planos.length > 0) ? planos : [
      { chave: 'trial', nome: 'Trial', valor_mensal: 0 },
      { chave: 'basico', nome: 'Básico', valor_mensal: 49.90 },
      { chave: 'profissional', nome: 'Profissional', valor_mensal: 99.90 },
      { chave: 'enterprise', nome: 'Enterprise', valor_mensal: 199.90 }
    ];
    console.log('✅ Planos:', planosDisponiveis.length);

    atualizarEstatisticas();
    renderizarListaPortariasMaster();
    
    showToast('✅ Painel carregado!');
    
  } catch (e) {
    console.error('❌ Erro:', e);
    showToast('Erro: ' + e.message);
  }
}

// ============================================================
// ATUALIZAR ESTATÍSTICAS
// ============================================================
function atualizarEstatisticas() {
  const total = todasPortarias.filter(p => p.tipo !== 'mestre').length;
  const ativas = todasAssinaturas.filter(a => a.status === 'ativa').length;
  const vencidas = todasAssinaturas.filter(a => a.status === 'vencida' || a.status === 'trial' || a.status === 'cancelada').length;
  
  let faturamento = 0;
  todasAssinaturas.forEach(a => {
    if (a.status === 'ativa' && a.valor_mensal) faturamento += a.valor_mensal;
  });

  document.getElementById('totalPortarias').textContent = total;
  document.getElementById('ativasCount').textContent = ativas;
  document.getElementById('vencidasCount').textContent = vencidas;
  document.getElementById('faturamentoTotal').textContent = `R$ ${faturamento.toFixed(2)}`;
}

// ============================================================
// RENDERIZAR LISTA DE PORTARIAS
// ============================================================
function renderizarListaPortariasMaster() {
  const div = document.getElementById('listaPortariasMaster');
  const busca = document.getElementById('buscaPortaria')?.value?.toLowerCase() || '';
  const filtroStatus = document.getElementById('filtroStatusAssinatura')?.value || '';

  let filtradas = todasPortarias.filter(p => p.tipo !== 'mestre');

  if (busca) {
    filtradas = filtradas.filter(p => 
      p.nome.toLowerCase().includes(busca) || 
      (p.email || '').toLowerCase().includes(busca)
    );
  }

  if (filtroStatus) {
    filtradas = filtradas.filter(p => {
      const assinatura = todasAssinaturas.find(a => a.portaria_id === p.id);
      return assinatura?.status === filtroStatus;
    });
  }

  if (!filtradas.length) {
    div.innerHTML = '<p style="text-align:center;color:#8BB4C4;padding:20px;">Nenhuma portaria encontrada</p>';
    return;
  }

  div.innerHTML = filtradas.map(p => {
    const assinatura = todasAssinaturas.find(a => a.portaria_id === p.id);
    const plano = planosDisponiveis.find(pl => pl.chave === assinatura?.plano);
    
    const statusLabel = {
      'ativa': '✅ Ativa',
      'vencida': '🔴 Vencida',
      'trial': '⚠️ Trial',
      'cancelada': '❌ Cancelada'
    }[assinatura?.status] || '❓ Sem assinatura';

    const statusClass = {
      'ativa': 'badge-green',
      'vencida': 'badge-red',
      'trial': 'badge-amber',
      'cancelada': 'badge-red'
    }[assinatura?.status] || '';

    const vencimento = assinatura?.data_vencimento 
      ? new Date(assinatura.data_vencimento).toLocaleDateString('pt-BR')
      : '—';

    return `
      <div class="portaria-card" data-portaria-id="${p.id}">
        <div class="info">
          <div style="font-weight:600;">🏢 ${p.nome}</div>
          <div style="font-size:12px;color:#8BB4C4;">${p.email || 'Sem email'}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span style="font-size:11px;color:#8BB4C4;">${plano?.nome || 'Sem plano'}</span>
          <span style="font-size:11px;color:#8BB4C4;">📅 ${vencimento}</span>
          <span class="badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="actions">
          <button class="action-btn" data-action="detalhes" title="Ver detalhes">👁️</button>
          <button class="action-btn" data-action="assinatura" title="Gerenciar assinatura">💳</button>
          <button class="action-btn" data-action="editar" title="Editar">✏️</button>
          <button class="action-btn" data-action="bloquear" title="Bloquear/Desbloquear">🔒</button>
          <button class="action-btn danger" data-action="excluir" title="Excluir">🗑️</button>
        </div>
      </div>
    `;
  }).join('');

  // Event delegation
  div.onclick = function(e) {
    const btn = e.target.closest('.action-btn');
    if (!btn) return;
    
    const card = btn.closest('.portaria-card');
    if (!card) return;
    
    const portariaId = card.dataset.portariaId;
    const action = btn.dataset.action;
    
    e.stopPropagation();
    
    console.log(`🎯 Ação: ${action}, Portaria: ${portariaId}`);
    
    switch(action) {
      case 'detalhes': verDetalhesPortaria(portariaId); break;
      case 'assinatura': abrirGerenciarAssinatura(portariaId); break;
      case 'editar': abrirEditarPortaria(portariaId); break;
      case 'bloquear': toggleBloqueioPortaria(portariaId); break;
      case 'excluir': excluirPortaria(portariaId); break;
      default: showToast('Ação desconhecida');
    }
  };
}

// ============================================================
// FUNÇÕES DOS MODAIS
// ============================================================

function criarModal(html) {
  // Remove modal existente
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.innerHTML = html;
  const modal = div.firstElementChild;
  document.body.appendChild(modal);
  
  modal.addEventListener('click', function(e) {
    if (e.target === this) this.remove();
  });
  
  return modal;
}

// VER DETALHES
function verDetalhesPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);
  const plano = planosDisponiveis.find(p => p.chave === assinatura?.plano);

  const statusLabel = {
    'ativa': '✅ Ativa',
    'vencida': '🔴 Vencida',
    'trial': '⚠️ Trial',
    'cancelada': '❌ Cancelada'
  }[assinatura?.status] || '❓ Desconhecido';

  const html = `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="handle"></div>
        <h3>🏢 ${portaria.nome}</h3>
        <p style="color:#8BB4C4;">${portaria.email || 'Sem email'}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;">
          <div style="background:#162F39;padding:12px;border-radius:8px;"><div style="font-size:10px;color:#8BB4C4;">Status</div><div style="font-weight:600;">${statusLabel}</div></div>
          <div style="background:#162F39;padding:12px;border-radius:8px;"><div style="font-size:10px;color:#8BB4C4;">Plano</div><div style="font-weight:600;">${plano?.nome || '—'}</div></div>
          <div style="background:#162F39;padding:12px;border-radius:8px;"><div style="font-size:10px;color:#8BB4C4;">Vencimento</div><div style="font-weight:600;">${assinatura?.data_vencimento ? new Date(assinatura.data_vencimento).toLocaleDateString('pt-BR') : '—'}</div></div>
          <div style="background:#162F39;padding:12px;border-radius:8px;"><div style="font-size:10px;color:#8BB4C4;">Valor</div><div style="font-weight:600;">R$ ${(assinatura?.valor_mensal || 0).toFixed(2)}</div></div>
        </div>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Fechar</button>
      </div>
    </div>
  `;

  criarModal(html);
}

// GERENCIAR ASSINATURA
function abrirGerenciarAssinatura(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);

  const html = `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="handle"></div>
        <h3>💳 Gerenciar Assinatura</h3>
        <p style="color:#8BB4C4;">${portaria.nome}</p>
        
        <div class="field">
          <label>PLANO</label>
          <select id="selectPlano">
            ${planosDisponiveis.map(p => `
              <option value="${p.chave}" ${assinatura?.plano === p.chave ? 'selected' : ''}>
                ${p.nome} - R$ ${p.valor_mensal.toFixed(2)}/mês
              </option>
            `).join('')}
            <option value="trial" ${assinatura?.plano === 'trial' ? 'selected' : ''}>Trial - R$ 0,00/mês</option>
          </select>
        </div>

        <div class="field">
          <label>DATA DE VENCIMENTO</label>
          <input type="date" id="inputVencimento" value="${assinatura?.data_vencimento?.split('T')[0] || ''}">
        </div>

        <button class="btn btn-primary" onclick="salvarAssinatura('${portariaId}')">💾 Salvar</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      </div>
    </div>
  `;

  criarModal(html);
}

// SALVAR ASSINATURA
async function salvarAssinatura(portariaId) {
  const plano = document.getElementById('selectPlano').value;
  const vencimento = document.getElementById('inputVencimento').value;
  
  if (!vencimento) {
    showToast('⚠️ Selecione uma data de vencimento');
    return;
  }

  const planoData = planosDisponiveis.find(p => p.chave === plano);
  
  try {
    showLoading('Salvando...');
    
    const { data: existing } = await supa
      .from('assinaturas')
      .select('id')
      .eq('portaria_id', portariaId)
      .maybeSingle();

    const dataVencimento = new Date(vencimento).toISOString();
    
    if (existing) {
      await supa
        .from('assinaturas')
        .update({
          plano: plano,
          status: 'ativa',
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0,
          updated_at: new Date().toISOString()
        })
        .eq('portaria_id', portariaId);
    } else {
      await supa
        .from('assinaturas')
        .insert({
          portaria_id: portariaId,
          plano: plano,
          status: 'ativa',
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0
        });
    }

    showToast('✅ Assinatura salva!');
    document.querySelector('.modal-overlay')?.remove();
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// BLOQUEAR/DESBLOQUEAR
async function toggleBloqueioPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);
  const isBloqueado = assinatura?.status === 'vencida' || assinatura?.status === 'cancelada';

  if (!confirm(`Deseja ${isBloqueado ? 'DESBLOQUEAR' : 'BLOQUEAR'} a portaria "${portaria.nome}"?`)) return;

  try {
    const novoStatus = isBloqueado ? 'ativa' : 'vencida';
    
    await supa
      .from('assinaturas')
      .update({ status: novoStatus, updated_at: new Date().toISOString() })
      .eq('portaria_id', portariaId);

    showToast(isBloqueado ? '✅ Portaria desbloqueada' : '🔒 Portaria bloqueada');
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// EXCLUIR PORTARIA
async function excluirPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  if (!confirm(`Tem certeza que deseja EXCLUIR "${portaria.nome}"?`)) return;

  try {
    await supa.from('assinaturas').delete().eq('portaria_id', portariaId);
    await supa.from('portarias').delete().eq('id', portariaId);

    showToast('🗑️ Portaria excluída!');
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// EDITAR PORTARIA
function abrirEditarPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }

  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);

  const html = `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="handle"></div>
        <h3>✏️ Editar Portaria</h3>
        
        <div class="field">
          <label>NOME</label>
          <input type="text" id="editPortariaNome" value="${portaria.nome}">
        </div>

        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="editPortariaEmail" value="${portaria.email || ''}">
        </div>

        <div class="field">
          <label>PLANO</label>
          <select id="editPortariaPlano">
            ${planosDisponiveis.map(p => `
              <option value="${p.chave}" ${assinatura?.plano === p.chave ? 'selected' : ''}>
                ${p.nome} - R$ ${p.valor_mensal.toFixed(2)}/mês
              </option>
            `).join('')}
            <option value="trial" ${assinatura?.plano === 'trial' ? 'selected' : ''}>Trial</option>
          </select>
        </div>

        <div class="field">
          <label>VENCIMENTO</label>
          <input type="date" id="editPortariaVencimento" value="${assinatura?.data_vencimento?.split('T')[0] || ''}">
        </div>

        <div class="field">
          <label>STATUS</label>
          <select id="editPortariaStatus">
            <option value="ativa" ${assinatura?.status === 'ativa' ? 'selected' : ''}>✅ Ativa</option>
            <option value="vencida" ${assinatura?.status === 'vencida' ? 'selected' : ''}>🔴 Vencida</option>
            <option value="trial" ${assinatura?.status === 'trial' ? 'selected' : ''}>⚠️ Trial</option>
            <option value="cancelada" ${assinatura?.status === 'cancelada' ? 'selected' : ''}>❌ Cancelada</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="salvarEdicaoPortaria('${portariaId}')">💾 Salvar</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      </div>
    </div>
  `;

  criarModal(html);
}

// SALVAR EDIÇÃO
async function salvarEdicaoPortaria(portariaId) {
  const nome = document.getElementById('editPortariaNome').value.trim();
  const email = document.getElementById('editPortariaEmail').value.trim();
  const plano = document.getElementById('editPortariaPlano').value;
  const vencimento = document.getElementById('editPortariaVencimento').value;
  const status = document.getElementById('editPortariaStatus').value;

  if (!nome) {
    showToast('⚠️ Nome é obrigatório');
    return;
  }

  try {
    showLoading('Salvando...');

    await supa
      .from('portarias')
      .update({ nome, email })
      .eq('id', portariaId);

    const planoData = planosDisponiveis.find(p => p.chave === plano);
    const dataVencimento = vencimento ? new Date(vencimento).toISOString() : new Date(Date.now() + 30*24*60*60*1000).toISOString();

    const { data: existing } = await supa
      .from('assinaturas')
      .select('id')
      .eq('portaria_id', portariaId)
      .maybeSingle();

    if (existing) {
      await supa
        .from('assinaturas')
        .update({
          plano, status,
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0,
          updated_at: new Date().toISOString()
        })
        .eq('portaria_id', portariaId);
    } else {
      await supa
        .from('assinaturas')
        .insert({
          portaria_id: portariaId,
          plano, status,
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0
        });
    }

    showToast('✅ Portaria atualizada!');
    document.querySelector('.modal-overlay')?.remove();
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// CRIAR PORTARIA
async function criarPortaria() {
  const nome = document.getElementById('novaPortariaNome').value.trim();
  const email = document.getElementById('novaPortariaEmail').value.trim();
  const senha = document.getElementById('novaPortariaSenha').value.trim();
  const plano = document.getElementById('novaPortariaPlano').value;
  const vencimento = document.getElementById('novaPortariaVencimento').value;

  if (!nome || !email) {
    showToast('⚠️ Preencha Nome e Email');
    return;
  }

  try {
    showLoading('Criando...');

    let userId = null;

    if (senha && senha.length >= 6) {
      const { data, error } = await supa.auth.signUp({
        email, password: senha,
        options: { data: { nome, tipo: 'admin' } }
      });
      if (error) throw error;
      userId = data?.user?.id;
    } else {
      showToast('📧 Enviando convite...');
      const codigo = 'ADMIN_' + Math.random().toString(36).substring(2, 10).toUpperCase();
      await supa.from('convites').insert({
        email, nome, role: 'admin',
        portaria_id: 'PENDING_' + Date.now(),
        portaria_nome: nome,
        codigo,
        status: 'pendente',
        expira_em: new Date(Date.now() + 7*24*60*60*1000).toISOString()
      });
      showToast('✅ Convite enviado para ' + email);
      document.querySelector('.modal-overlay')?.remove();
      await carregarPainelMaster();
      return;
    }

    if (!userId) throw new Error('Erro ao criar usuário');

    const { data: portariaData, error: portariaError } = await supa
      .from('portarias')
      .insert({
        id: userId, nome, email,
        tipo: 'admin',
        codigo: 'ADMIN_' + Math.random().toString(36).substring(2, 8).toUpperCase()
      })
      .select()
      .single();

    if (portariaError) throw portariaError;

    const planoData = planosDisponiveis.find(p => p.chave === plano);
    const dataVencimento = vencimento ? new Date(vencimento).toISOString() : new Date(Date.now() + 30*24*60*60*1000).toISOString();

    await supa.from('assinaturas').insert({
      portaria_id: portariaData.id,
      plano,
      status: 'ativa',
      data_vencimento: dataVencimento,
      valor_mensal: planoData?.valor_mensal || 0
    });

    showToast('✅ Portaria criada!');
    document.querySelector('.modal-overlay')?.remove();
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// SALVAR PLANO
async function salvarPlano() {
  const nome = document.getElementById('planoNome').value.trim();
  const chave = document.getElementById('planoChave').value.trim().toLowerCase();
  const descricao = document.getElementById('planoDescricao').value.trim();
  const valor = parseFloat(document.getElementById('planoValor').value) || 0;

  if (!nome || !chave) {
    showToast('⚠️ Preencha Nome e Chave');
    return;
  }

  try {
    await supa.from('planos').insert({
      nome, chave, descricao,
      valor_mensal: valor,
      max_portarias: 1,
      max_usuarios: 3,
      ativo: true
    });

    showToast('✅ Plano criado!');
    document.querySelector('.modal-overlay')?.remove();
    await carregarPainelMaster();

  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// START
// ============================================================
(async function start() {
  if (!initSupabase()) return;
  
  // Verifica se já está logado
  const saved = localStorage.getItem('portaria_atual');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.tipo === 'mestre') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('portariaNome').textContent = '👑 Mestre';
        await carregarPainelMaster();
        return;
      }
    } catch(e) {}
  }
  
  document.getElementById('loginScreen').style.display = 'block';
})();
</script>
