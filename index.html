<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PortariaPro - Painel Master</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ===== CSS COMPLETO ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', Arial, sans-serif; background: #060D10; color: #E8F4F7; padding: 20px; }
.app { max-width: 900px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(26, 91, 110, 0.2); margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.header h2 { color: #40D4E0; }
.header .user { color: #8BB4C4; font-size: 14px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-primary { background: linear-gradient(135deg, #0B3B4A, #072A35); color: #fff; }
.btn-ghost { background: #162F39; color: #8BB4C4; border: 1px solid rgba(26, 91, 110, 0.4); }
.btn-danger { background: #FF6B5B; color: #fff; }
.btn-danger:hover { background: #e05545; }
.btn-success { background: #3DD6B6; color: #fff; }
.card { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.master-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.master-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.master-stat { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.2); border-radius: 8px; padding: 14px 10px; text-align: center; }
.master-stat .number { font-size: 24px; font-weight: 700; }
.master-stat .number.positive { color: #3DD6B6; }
.master-stat .number.negative { color: #FF6B5B; }
.master-stat .number.warning { color: #F0B84A; }
.master-stat .label { font-size: 10px; color: #8BB4C4; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.master-filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.master-filtros input, .master-filtros select { padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(26, 91, 110, 0.4); background: #162F39; color: #E8F4F7; font-size: 12px; }
.master-filtros input::placeholder { color: #8BB4C4; }
.portaria-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; border-bottom: 1px solid rgba(26, 91, 110, 0.15); flex-wrap: wrap; gap: 8px; }
.portaria-card:last-child { border-bottom: none; }
.portaria-card .info { flex: 1; min-width: 150px; }
.portaria-card .info .nome { font-weight: 600; font-size: 14px; }
.portaria-card .info .email { font-size: 12px; color: #8BB4C4; }
.portaria-card .badge { padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.badge-green { background: rgba(61, 214, 182, 0.12); color: #3DD6B6; }
.badge-red { background: rgba(255, 107, 91, 0.12); color: #FF6B5B; }
.badge-amber { background: rgba(240, 184, 74, 0.12); color: #F0B84A; }
.portaria-card .actions { display: flex; gap: 2px; flex-wrap: wrap; }
.portaria-card .actions .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; color: #8BB4C4; transition: all 0.2s; }
.portaria-card .actions .action-btn:hover { background: #162F39; color: #E8F4F7; }
.portaria-card .actions .action-btn.danger:hover { background: rgba(255, 107, 91, 0.2); color: #FF6B5B; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.modal-content { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.3); border-radius: 12px; padding: 24px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-content .handle { width: 40px; height: 4px; background: rgba(26, 91, 110, 0.4); border-radius: 2px; margin: 0 auto 12px; }
.modal-content h3 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.modal-content .sub { font-size: 13px; color: #8BB4C4; margin-bottom: 16px; }
.modal-content .field { margin-bottom: 14px; }
.modal-content .field label { display: block; font-size: 11px; color: #8BB4C4; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-content .field input, .modal-content .field select, .modal-content .field textarea { width: 100%; padding: 10px 12px; background: #162F39; border: 1px solid rgba(26, 91, 110, 0.4); border-radius: 8px; color: #E8F4F7; font-size: 14px; outline: none; }
.modal-content .field input:focus, .modal-content .field select:focus { border-color: #40D4E0; }
.modal-content .field .hint { font-size: 10px; color: #8BB4C4; margin-top: 4px; }
.modal-content .btn { width: 100%; margin-top: 6px; }
.modal-content .btn:first-child { margin-top: 0; }
.modal-content .btn + .btn { margin-top: 6px; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #162F39; border: 1px solid rgba(26, 91, 110, 0.4); padding: 10px 24px; border-radius: 20px; z-index: 2000; font-size: 14px; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.toast.show { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.login-screen h1 { font-size: 36px; margin-bottom: 4px; background: linear-gradient(135deg, #E8F4F7, #40D4E0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.login-screen .sub { font-size: 14px; color: #8BB4C4; margin-bottom: 24px; }
.login-screen .login-box { background: #0E1F26; border: 1px solid rgba(26, 91, 110, 0.2); border-radius: 12px; padding: 32px; max-width: 360px; width: 100%; }
.login-screen .login-box .field { margin-bottom: 12px; }
.login-screen .login-box .field input { width: 100%; padding: 12px; background: #162F39; border: 1px solid rgba(26, 91, 110, 0.4); border-radius: 8px; color: #E8F4F7; font-size: 16px; }
.login-screen .login-box .field input:focus { border-color: #40D4E0; outline: none; }
.login-screen .login-box .btn { width: 100%; padding: 12px; font-size: 16px; }

.empty { text-align: center; padding: 40px 20px; color: #8BB4C4; }
.loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
.loading-overlay.active { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(26, 91, 110, 0.3); border-top-color: #40D4E0; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #8BB4C4; font-size: 14px; }

@media (max-width: 600px) {
  .master-stats { grid-template-columns: 1fr 1fr; gap: 6px; }
  .master-stat .number { font-size: 18px; }
  .portaria-card { flex-direction: column; align-items: stretch; }
  .portaria-card .actions { justify-content: flex-start; }
  .modal-content { padding: 16px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Carregando...</div>
</div>

<div class="app">
  <!-- TELA DE LOGIN -->
  <div class="login-screen" id="loginScreen">
    <h1>🚛 PortariaPro</h1>
    <p class="sub">Controle de acesso e gestão de portarias</p>
    <div class="login-box">
      <div class="field"><input type="email" id="loginEmail" placeholder="Email" value="master@portariapro.com"></div>
      <div class="field"><input type="password" id="loginPassword" placeholder="Senha" value="Master@2024#Admin"></div>
      <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
      <div id="loginError" style="color:#FF6B5B;font-size:13px;margin-top:8px;min-height:20px;"></div>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="mainApp" style="display:none;">
    <div class="header">
      <h2>🚛 PortariaPro</h2>
      <div class="user" id="portariaNome">👑 Mestre</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="logout()" style="padding:6px 16px;font-size:12px;">Sair</button>
      </div>
    </div>

    <div class="master-header">
      <div>
        <h3 style="font-size:20px;">👑 Painel Master</h3>
        <p style="color:#8BB4C4;font-size:13px;">Gerencie todas as portarias, licenças e assinaturas</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openAdicionarPortariaModal()">🏢 Nova Portaria</button>
        <button class="btn btn-primary" onclick="openPlanoModal()">➕ Novo Plano</button>
        <button class="btn btn-ghost" onclick="carregarPainelMaster()" style="padding:8px 16px;font-size:12px;">🔄 Atualizar</button>
      </div>
    </div>

    <div class="master-stats" id="masterStats">
      <div class="master-stat"><div class="number" id="totalPortarias">0</div><div class="label">Total Portarias</div></div>
      <div class="master-stat"><div class="number positive" id="ativasCount">0</div><div class="label">Assinaturas Ativas</div></div>
      <div class="master-stat"><div class="number negative" id="vencidasCount">0</div><div class="label">Vencidas/Canceladas</div></div>
      <div class="master-stat"><div class="number warning" id="faturamentoTotal">R$ 0</div><div class="label">Faturamento Mensal</div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
        <h4 style="font-size:14px;color:#8BB4C4;">📋 Portarias Cadastradas</h4>
        <div class="master-filtros" style="margin:0;">
          <input type="text" id="buscaPortaria" placeholder="🔍 Buscar..." oninput="renderizarListaPortariasMaster()">
          <select id="filtroStatusAssinatura" onchange="renderizarListaPortariasMaster()">
            <option value="">Todos os status</option>
            <option value="ativa">✅ Ativas</option>
            <option value="vencida">🔴 Vencidas</option>
            <option value="trial">⚠️ Trial</option>
            <option value="cancelada">❌ Canceladas</option>
          </select>
        </div>
      </div>
      <div id="listaPortariasMaster"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURAÇÃO
// ============================================================
const SUPABASE_URL = 'https://wqzbmlfiwmjhkjprnzrv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxemJtbGZpd21qaGtqcHJuenJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDA0MjEsImV4cCI6MjA5NzY3NjQyMX0.vza4qGtnkwq4LMM8HNCoHrfOPb8gzC4wse-qk9Yax9M';

let supa = null;
let todasPortarias = [];
let todasAssinaturas = [];
let planosDisponiveis = [];

// ============================================================
// UTILITÁRIOS
// ============================================================
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), duration);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Carregando...';
  document.getElementById('loadingOverlay').classList.add('active');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

function getPortaria() {
  try { return JSON.parse(localStorage.getItem('portaria_atual') || 'null'); } 
  catch(e) { return null; }
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

// ============================================================
// SUPABASE
// ============================================================
function initSupabase() {
  try {
    supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase conectado');
    return true;
  } catch (e) {
    console.error('❌ Erro:', e);
    showToast('Erro ao conectar ao Supabase');
    return false;
  }
}

// ============================================================
// LOGIN
// ============================================================
async function fazerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.textContent = '';

  if (!email || !password) {
    errorDiv.textContent = 'Preencha email e senha';
    return;
  }

  try {
    showLoading('Entrando...');
    
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    
    localStorage.setItem('portaria_atual', JSON.stringify({
      id: data.user.id,
      nome: 'Master',
      tipo: 'mestre',
      email: email
    }));
    
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('portariaNome').textContent = `👑 Mestre (${email})`;
    
    hideLoading();
    await carregarPainelMaster();
  } catch (e) {
    hideLoading();
    errorDiv.textContent = 'Erro: ' + e.message;
    showToast('Erro ao entrar: ' + e.message);
  }
}

function logout() {
  localStorage.removeItem('portaria_atual');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginError').textContent = '';
}

// ============================================================
// CARREGAR PAINEL MASTER
// ============================================================
async function carregarPainelMaster() {
  try {
    showLoading('Carregando...');
    console.log('🔄 Carregando painel master...');
    
    const { data: portarias, error: pError } = await supa
      .from('portarias')
      .select('*')
      .order('criado_em', { ascending: false });
    
    if (pError) throw pError;
    todasPortarias = portarias || [];
    console.log('✅ Portarias:', todasPortarias.length);

    const { data: assinaturas, error: aError } = await supa
      .from('assinaturas')
      .select('*');
    
    if (aError && !aError.message.includes('relation')) throw aError;
    todasAssinaturas = assinaturas || [];
    console.log('✅ Assinaturas:', todasAssinaturas.length);

    const { data: planos, error: planError } = await supa
      .from('planos')
      .select('*')
      .eq('ativo', true);
    
    if (planError) {
      if (planError.message.includes('relation')) {
        console.warn('⚠️ Tabela planos não existe');
        planosDisponiveis = [
          { chave: 'trial', nome: 'Trial', valor_mensal: 0 },
          { chave: 'basico', nome: 'Básico', valor_mensal: 49.90 },
          { chave: 'profissional', nome: 'Profissional', valor_mensal: 99.90 },
          { chave: 'enterprise', nome: 'Enterprise', valor_mensal: 199.90 }
        ];
      } else {
        throw planError;
      }
    } else {
      planosDisponiveis = (planos && planos.length > 0) ? planos : [
        { chave: 'trial', nome: 'Trial', valor_mensal: 0 },
        { chave: 'basico', nome: 'Básico', valor_mensal: 49.90 },
        { chave: 'profissional', nome: 'Profissional', valor_mensal: 99.90 },
        { chave: 'enterprise', nome: 'Enterprise', valor_mensal: 199.90 }
      ];
      console.log('✅ Planos:', planosDisponiveis.length);
    }

    atualizarEstatisticas();
    renderizarListaPortariasMaster();
    
    hideLoading();
    
  } catch (e) {
    console.error('❌ Erro:', e);
    hideLoading();
    showToast('Erro ao carregar: ' + e.message);
  }
}

// ============================================================
// ATUALIZAR ESTATÍSTICAS
// ============================================================
function atualizarEstatisticas() {
  const total = todasPortarias.filter(p => p.tipo !== 'mestre').length;
  const ativas = todasAssinaturas.filter(a => a.status === 'ativa').length;
  const vencidas = todasAssinaturas.filter(a => a.status === 'vencida' || a.status === 'trial' || a.status === 'cancelada').length;
  
  let faturamento = 0;
  todasAssinaturas.forEach(a => {
    if (a.status === 'ativa' && a.valor_mensal) faturamento += a.valor_mensal;
  });

  document.getElementById('totalPortarias').textContent = total;
  document.getElementById('ativasCount').textContent = ativas;
  document.getElementById('vencidasCount').textContent = vencidas;
  document.getElementById('faturamentoTotal').textContent = `R$ ${faturamento.toFixed(2)}`;
}

// ============================================================
// RENDERIZAR LISTA DE PORTARIAS
// ============================================================
function renderizarListaPortariasMaster() {
  const div = document.getElementById('listaPortariasMaster');
  const busca = document.getElementById('buscaPortaria')?.value?.toLowerCase() || '';
  const filtroStatus = document.getElementById('filtroStatusAssinatura')?.value || '';

  let filtradas = todasPortarias.filter(p => p.tipo !== 'mestre');

  if (busca) {
    filtradas = filtradas.filter(p => 
      p.nome.toLowerCase().includes(busca) || 
      (p.email || '').toLowerCase().includes(busca)
    );
  }

  if (filtroStatus) {
    filtradas = filtradas.filter(p => {
      const assinatura = todasAssinaturas.find(a => a.portaria_id === p.id);
      return assinatura?.status === filtroStatus;
    });
  }

  if (!filtradas.length) {
    div.innerHTML = `<div class="empty"><div style="font-size:40px;margin-bottom:12px;">🏢</div><p>${busca ? 'Nenhuma portaria encontrada' : 'Nenhuma portaria cadastrada'}</p></div>`;
    return;
  }

  div.innerHTML = filtradas.map(p => {
    const assinatura = todasAssinaturas.find(a => a.portaria_id === p.id);
    const plano = planosDisponiveis.find(pl => pl.chave === assinatura?.plano);
    
    const statusLabel = {
      'ativa': '✅ Ativa',
      'vencida': '🔴 Vencida',
      'trial': '⚠️ Trial',
      'cancelada': '❌ Cancelada'
    }[assinatura?.status] || '❓ Sem assinatura';

    const statusClass = {
      'ativa': 'badge-green',
      'vencida': 'badge-red',
      'trial': 'badge-amber',
      'cancelada': 'badge-red'
    }[assinatura?.status] || '';

    const vencimento = assinatura?.data_vencimento 
      ? new Date(assinatura.data_vencimento).toLocaleDateString('pt-BR')
      : '—';

    const valor = assinatura?.valor_mensal ? `R$ ${assinatura.valor_mensal.toFixed(2)}` : '—';

    return `
      <div class="portaria-card" data-portaria-id="${p.id}">
        <div class="info">
          <div class="nome">🏢 ${p.nome}</div>
          <div class="email">${p.email || 'Sem email'}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span style="font-size:11px;color:#8BB4C4;">${plano?.nome || 'Sem plano'}</span>
          <span style="font-size:11px;color:#8BB4C4;">${valor}</span>
          <span style="font-size:11px;color:#8BB4C4;">📅 ${vencimento}</span>
          <span class="badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="actions">
          <button class="action-btn" data-action="detalhes" title="Ver detalhes">👁️</button>
          <button class="action-btn" data-action="assinatura" title="Gerenciar assinatura">💳</button>
          <button class="action-btn" data-action="editar" title="Editar portaria">✏️</button>
          <button class="action-btn" data-action="bloquear" title="Bloquear/Desbloquear">🔒</button>
          <button class="action-btn danger" data-action="excluir" title="Excluir portaria">🗑️</button>
        </div>
      </div>
    `;
  }).join('');

  // Event delegation
  div.onclick = function(e) {
    const btn = e.target.closest('.action-btn');
    if (!btn) return;
    
    const card = btn.closest('.portaria-card');
    if (!card) return;
    
    const portariaId = card.dataset.portariaId;
    const action = btn.dataset.action;
    
    e.stopPropagation();
    
    console.log(`🎯 Ação: ${action}, Portaria: ${portariaId}`);
    
    switch(action) {
      case 'detalhes': verDetalhesPortaria(portariaId); break;
      case 'assinatura': abrirGerenciarAssinatura(portariaId); break;
      case 'editar': abrirEditarPortaria(portariaId); break;
      case 'bloquear': toggleBloqueioPortaria(portariaId); break;
      case 'excluir': excluirPortaria(portariaId); break;
      default: showToast('Ação desconhecida');
    }
  };
}

// ============================================================
// FUNÇÕES AUXILIARES DE MODAL
// ============================================================
function criarModal(html) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.innerHTML = html;
  const modal = div.firstElementChild;
  document.body.appendChild(modal);
  
  modal.addEventListener('click', function(e) {
    if (e.target === this) this.remove();
  });
  
  return modal;
}

function fecharModal() {
  document.querySelector('.modal-overlay')?.remove();
}

// ============================================================
// 1. VER DETALHES
// ============================================================
function verDetalhesPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);
  const plano = planosDisponiveis.find(p => p.chave === assinatura?.plano);

  const statusLabel = {
    'ativa': '✅ Ativa',
    'vencida': '🔴 Vencida',
    'trial': '⚠️ Trial',

async function salvarAssinatura(portariaId) {
  const plano = document.getElementById('selectPlano').value;
  const vencimento = document.getElementById('inputVencimento').value;
  
  if (!vencimento) {
    showToast('⚠️ Selecione uma data de vencimento');
    return;
  }

  const planoData = planosDisponiveis.find(p => p.chave === plano);
  
  try {
    showLoading('Salvando assinatura...');
    
    const { data: existing } = await supa
      .from('assinaturas')
      .select('id')
      .eq('portaria_id', portariaId)
      .maybeSingle();

    const dataVencimento = new Date(vencimento).toISOString();
    
    if (existing) {
      await supa
        .from('assinaturas')
        .update({
          plano: plano,
          status: 'ativa',
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0,
          updated_at: new Date().toISOString()
        })
        .eq('portaria_id', portariaId);
    } else {
      await supa
        .from('assinaturas')
        .insert({
          portaria_id: portariaId,
          plano: plano,
          status: 'ativa',
          data_vencimento: dataVencimento,
          valor_mensal: planoData?.valor_mensal || 0
        });
    }

    showToast('✅ Assinatura salva com sucesso!');
    fecharModal();
    hideLoading();
    await carregarPainelMaster();

  } catch (e) {
    hideLoading();
    showToast('Erro: ' + e.message);
  }
}

// 3. BLOQUEAR/DESBLOQUEAR
// ============================================================
async function toggleBloqueioPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  const assinatura = todasAssinaturas.find(a => a.portaria_id === portariaId);
  const isBloqueado = assinatura?.status === 'vencida' || assinatura?.status === 'cancelada';

  if (!confirm(`Deseja ${isBloqueado ? 'DESBLOQUEAR' : 'BLOQUEAR'} a portaria "${portaria.nome}"?`)) return;

  try {
    showLoading(isBloqueado ? 'Desbloqueando...' : 'Bloqueando...');
    
    const novoStatus = isBloqueado ? 'ativa' : 'vencida';
    
    await supa
      .from('assinaturas')
      .update({ status: novoStatus, updated_at: new Date().toISOString() })
      .eq('portaria_id', portariaId);

    showToast(isBloqueado ? '✅ Portaria desbloqueada' : '🔒 Portaria bloqueada');
    hideLoading();
    await carregarPainelMaster();

  } catch (e) {
    hideLoading();
    showToast('Erro: ' + e.message);
  }
}

// 4. EXCLUIR PORTARIA
// ============================================================
async function excluirPortaria(portariaId) {
  const portaria = todasPortarias.find(p => p.id === portariaId);
  if (!portaria) { showToast('Portaria não encontrada'); return; }
  
  if (portaria.tipo === 'mestre') {
    showToast('⚠️ Não é possível excluir o usuário mestre');
    return;
  }
  
  if (!confirm(`Excluir a portaria "${portaria.nome}"?\n\nIsso removerá:\n- Histórico de validações\n- Motoristas cadastrados\n- Convites\n- Assinatura\n\nTem certeza?`)) return;

  try {
    showLoading('Excluindo portaria e dados relacionados...');
    
    // Tenta excluir de todas as tabelas
    const tabelas = ['validacoes', 'motoristas', 'convites', 'assinaturas'];
    for (const tabela of tabelas) {
      try {
        await supa.from(tabela).delete().eq('portaria_id', portariaId);
        console.log(`✅ ${tabela} excluídos`);
      } catch (e) {
        console.log(`⚠️ Erro ao excluir ${tabela}:`, e.message);
      }
    }
    
    // Exclui a portaria
    const { error } = await supa.from('portarias').delete().eq('id', portariaId);
    if (error) throw error;

    showToast(`🗑️ Portaria "${portaria.nome}" excluída com sucesso!`);
    hideLoading();
    await carregarPainelMaster();

  } catch (e) {
    console.error('❌ Erro ao excluir:', e);
    hideLoading();
    showToast('Erro ao excluir: ' + e.message);
  }
}

async function criarPortaria() {
  const nome = document.getElementById('novaPortariaNome').value.trim();
  const email = document.getElementById('novaPortariaEmail').value.trim();
  const plano = document.getElementById('novaPortariaPlano').value;
  const vencimento = document.getElementById('novaPortariaVencimento').value;

  if (!nome || !email) {
    showToast('⚠️ Preencha Nome e Email');
    return;
  }

  if (!email.includes('@')) {
    showToast('⚠️ Email inválido');
    return;
  }

  const portaria = getPortaria();
  if (!portaria || portaria.tipo !== 'mestre') {
    showToast('⚠️ Apenas o mestre pode criar');
    return;
  }

  try {
    showLoading('Criando portaria...');

    // Verifica se o email já existe
    const { data: existing } = await supa
      .from('portarias')
      .select('id')
      .eq('email', email)
      .maybeSingle();

    if (existing) {
      throw new Error('Este email já está cadastrado como portaria');
    }

    // Gera UUID válido
    const userId = generateUUID();

    // Cria a portaria
    const { data: portariaData, error: portariaError } = await supa
      .from('portarias')
      .insert({
        id: userId,
        nome: nome,
        email: email,
        tipo: 'admin',
        codigo: 'ADMIN_' + Math.random().toString(36).substring(2, 8).toUpperCase(),
        portaria_id: portaria.id
      })
      .select()
      .single();

    if (portariaError) throw portariaError;

    // Cria a assinatura
    const planoData = planosDisponiveis.find(p => p.chave === plano);
    const dataVencimento = vencimento ? new Date(vencimento).toISOString() : new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();

    try {
      await supa.from('assinaturas').insert({
        portaria_id: portariaData.id,
        plano: plano,
        status: 'ativa',
        data_vencimento: dataVencimento,
        valor_mensal: planoData?.valor_mensal || 0
      });
    } catch (e) {
      console.warn('Erro ao criar assinatura:', e.message);
    }

    // Tenta enviar convite
    try {
      const codigoConvite = 'CONV_' + Math.random().toString(36).substring(2, 10).toUpperCase();
      await supa.from('convites').insert({
        email: email,
        nome: nome,
        role: 'admin',
        portaria_id: portariaData.id,
        portaria_nome: nome,
        codigo: codigoConvite,
        criado_por: portaria.id,
        status: 'pendente',
        expira_em: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
      });
      showToast(`✅ Portaria criada! Convite gerado para ${email}`, 4000);
    } catch (e) {
      showToast(`✅ Portaria criada! (Convite não enviado)`, 3000);
    }

    fecharModal();
    hideLoading();
    await carregarPainelMaster();

  } catch (e) {
    console.error('❌ Erro:', e);
    hideLoading();
    showToast('Erro: ' + e.message);
  }
}

async function salvarPlano() {
  const nome = document.getElementById('planoNome').value.trim();
  const chave = document.getElementById('planoChave').value.trim().toLowerCase();
  const descricao = document.getElementById('planoDescricao').value.trim();
  const valor = parseFloat(document.getElementById('planoValor').value) || 0;
  const maxPortarias = parseInt(document.getElementById('planoMaxPortarias').value) || 1;
  const maxUsuarios = parseInt(document.getElementById('planoMaxUsuarios').value) || 3;
  const suporte = document.getElementById('planoSuporte').checked;
  const relatorios = document.getElementById('planoRelatorios').checked;

  if (!nome || !chave) {
    showToast('⚠️ Preencha Nome e Chave');
    return;
  }

  if (!/^[a-z0-9_]+$/.test(chave)) {
    showToast('⚠️ Chave inválida (use letras minúsculas, números e _)');
    return;
  }

  try {
    showLoading('Salvando plano...');
    
    const { data, error } = await supa
      .from('planos')
      .insert({
        nome, chave, descricao,
        valor_mensal: valor,
        max_portarias: maxPortarias,
        max_usuarios: maxUsuarios,
        possui_suporte: suporte,
        possui_relatorios: relatorios,
        ativo: true
      })
      .select();

    if (error) {
      if (error.message.includes('duplicate')) {
        throw new Error('Já existe um plano com esta chave');
      }
      if (error.message.includes('row-level security')) {
        throw new Error('Permissão negada. Execute o SQL para liberar RLS.');
      }
      throw error;
    }

    // Atualiza a lista de planos local
    if (data && data.length > 0) {
      planosDisponiveis.push(data[0]);
    }

    showToast('✅ Plano criado com sucesso!');
    fecharModal();
    hideLoading();
    await carregarPainelMaster();

  } catch (e) {
    hideLoading();
    showToast('Erro: ' + e.message);
  }
}

        document.getElementById('portariaNome').textContent = `👑 Mestre (${data.email || 'master@portariapro.com'})`;
        await carregarPainelMaster();
        return;
      }
    } catch(e) {}
  }
  
  document.getElementById('loginScreen').style.display = 'flex';
})();
